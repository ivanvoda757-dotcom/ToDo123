<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja To-Do Lista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Zadaci za danas</h1>
    <form id="add-form" class="add-form">
        <input type="text" id="task-input" placeholder="Novi zadatak" required>
        <button type="submit">Dodaj</button>
    </form>

    <div class="progress">
        <div class="bar" id="progress-bar" style="width: 0%;"></div>
    </div>
    <p>Status: <span id="progress-text">0%</span></p>

    <ul id="task-list"></ul>

    <script src="script.js"></script>
</body>
</html></content>
